name: 'Claude BugBot'
description: 'Analyze PR changes for bugs using Claude Code CLI and post inline review comments'
author: 'mitrasish-personal'

branding:
  icon: 'check-circle'
  color: 'orange'

inputs:
  claude-setup-token:
    description: 'Claude Code OAuth token from `claude setup-token` (for Max/Pro subscription users)'
    required: false
  anthropic-api-key:
    description: 'Anthropic API key (alternative to claude-setup-token)'
    required: false
  model:
    description: 'Claude model to use (e.g. sonnet, opus, haiku)'
    required: false
    default: 'sonnet'
  github-token:
    description: 'GitHub token for posting PR reviews'
    required: false
    default: ${{ github.token }}
  max-budget:
    description: 'Maximum budget in USD per analysis run'
    required: false
    default: '1.00'

runs:
  using: 'composite'
  steps:
    - name: Validate auth inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.claude-setup-token }}" ] && [ -z "${{ inputs.anthropic-api-key }}" ]; then
          echo "::error::Either 'claude-setup-token' or 'anthropic-api-key' must be provided"
          exit 1
        fi

    - name: Install Claude Code CLI
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Bypass onboarding for CI
      shell: bash
      run: |
        mkdir -p ~/.claude
        echo '{"hasCompletedOnboarding":true,"autoUpdaterStatus":"disabled","enableTelemetry":false}' > ~/.claude.json

    - name: Configure auth
      shell: bash
      env:
        SETUP_TOKEN: ${{ inputs.claude-setup-token }}
        API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        # Only export the auth var that is actually set — an empty ANTHROPIC_API_KEY
        # causes claude to attempt API-key auth with a blank value and hang on 401.
        if [ -n "$SETUP_TOKEN" ]; then
          echo "CLAUDE_CODE_OAUTH_TOKEN=$SETUP_TOKEN" >> "$GITHUB_ENV"
          echo "Auth: using Claude setup token (OAuth)"
        elif [ -n "$API_KEY" ]; then
          echo "ANTHROPIC_API_KEY=$API_KEY" >> "$GITHUB_ENV"
          echo "Auth: using Anthropic API key"
        fi

    - name: Run bug analysis
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        MODEL: ${{ inputs.model }}
        MAX_BUDGET: ${{ inputs.max-budget }}
      run: node ${{ github.action_path }}/analyze.mjs
